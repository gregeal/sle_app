name: sle_prep
description: "SLE Prep — French second-language (SLE) training toward a level C profile."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.0.0
  drift: ^2.34.2
  drift_flutter: ^0.3.1
  flutter_secure_storage: ^10.3.1
  http: ^1.2.0
  url_launcher: ^6.3.0
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.0
  flutter_webrtc: ^1.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.34.0
  build_runner: ^2.7.0
  flutter_launcher_icons: ^0.14.0
  sqlite3: ^3.5.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icon/icon_full.png
  adaptive_icon_background: "#3B5BA9"
  adaptive_icon_foreground: assets/icon/icon_fg.png
  web:
    generate: true
    image_path: assets/icon/icon_full.png
    background_color: "#FAF9FD"
    theme_color: "#3B5BA9"

flutter:
  uses-material-design: true
  assets:
    - assets/seed/
  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Variable.ttf
